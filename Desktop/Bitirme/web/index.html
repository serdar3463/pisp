<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PISP — Şirket Portalı</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-logo">
      <div class="mark">P</div>
      <h1>PISP Şirket Portalı</h1>
      <p>Token satın al · QR teklif oluştur · Veri talep et</p>
    </div>

    <div class="auth-card card">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Giriş Yap</div>
        <div class="tab" onclick="switchTab('register')">Kayıt Ol</div>
      </div>

      <!-- Login -->
      <div id="tab-login" class="flex-col gap-md">
        <div id="login-error" class="alert alert-error"></div>
        <div class="form-group">
          <label>E-posta</label>
          <input id="login-email" type="email" placeholder="sirket@ornek.com" />
        </div>
        <div class="form-group">
          <label>Şifre</label>
          <input id="login-password" type="password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary" onclick="login()">Giriş Yap</button>
      </div>

      <!-- Register -->
      <div id="tab-register" class="flex-col gap-md hidden">
        <div id="register-error" class="alert alert-error"></div>
        <div class="form-group">
          <label>Şirket Adı</label>
          <input id="reg-name" type="text" placeholder="Şirket A.Ş." />
        </div>
        <div class="form-group">
          <label>E-posta</label>
          <input id="reg-email" type="email" placeholder="sirket@ornek.com" />
        </div>
        <div class="form-group">
          <label>Şifre</label>
          <input id="reg-password" type="password" placeholder="En az 8 karakter" />
        </div>
        <button class="btn btn-primary" onclick="register()">Kayıt Ol</button>
        <p class="text-xs text-tertiary text-center">
          Kayıt olarak <a href="/legal/gizlilik.html">Gizlilik Politikası</a>'nı kabul etmiş olursunuz.
        </p>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem("pisp_token")) location.href = "/dashboard.html";

    function switchTab(tab) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll("[id^='tab-']").forEach(t => t.classList.add("hidden"));
      event.target.classList.add("active");
      document.getElementById("tab-" + tab).classList.remove("hidden");
    }

    async function login() {
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      const err = document.getElementById("login-error");
      err.classList.remove("show");
      try {
        const data = await api.post("/api/companies/login", { email, password });
        localStorage.setItem("pisp_token", data.token);
        localStorage.setItem("pisp_company", JSON.stringify(data.company));
        location.href = "/dashboard.html";
      } catch (e) {
        err.textContent = e.message;
        err.classList.add("show");
      }
    }

    async function register() {
      const name = document.getElementById("reg-name").value.trim();
      const email = document.getElementById("reg-email").value.trim();
      const password = document.getElementById("reg-password").value;
      const err = document.getElementById("register-error");
      err.classList.remove("show");
      try {
        const data = await api.post("/api/companies/register", { name, email, password });
        localStorage.setItem("pisp_token", data.token);
        localStorage.setItem("pisp_company", JSON.stringify(data.company));
        location.href = "/dashboard.html";
      } catch (e) {
        err.textContent = e.message;
        err.classList.add("show");
      }
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        const active = document.querySelector("[id^='tab-']:not(.hidden)").id;
        if (active === "tab-login") login();
        else register();
      }
    });
  </script>
</body>
</html>
